name: Update data + deploy

on:
  schedule:
    - cron: '0 13 * * *'   # 9:00 AM ET (UTC-4)
    - cron: '0 16 * * *'   # 12:00 PM ET
    - cron: '0 19 * * *'   # 3:00 PM ET
    - cron: '0 4 * * *'    # 12:00 AM ET (post-game history update)
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-history:
    name: Update history (midnight run only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * *'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run history pipeline
        run: node scripts/update-history.js

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/history.js
          git diff --staged --quiet || git commit -m "chore: update history data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

  update-games:
    name: Update today's games
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run games pipeline
        run: node scripts/update-games.js

      - name: Verify output was written
        run: |
          if grep -q "Auto-generated" src/data/games.js; then
            echo "games.js was updated successfully"
          else
            echo "ERROR: games.js was not updated — pipeline may have failed silently"
            exit 1
          fi

      - name: Commit updated games
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/games.js
          git diff --staged --quiet || git commit -m "chore: update games data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

  deploy:
    name: Build + deploy to Pages
    runs-on: ubuntu-latest
    needs: update-games
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
